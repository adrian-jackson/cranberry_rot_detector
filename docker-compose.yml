# docker-compose.yml
#
# Runs the React frontend and FastAPI backend as two containers.
# GPU inference runs on Modal (cloud) — no local CUDA required.
#
# Usage:
#   docker compose up --build
#
# Then open http://localhost:3000 in your browser.

services:
  # ── React frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"       # nginx serves the built React app on port 80 inside
    environment:
      # Points the frontend at the backend — do not change unless you
      # move the backend to a different host.
      - REACT_APP_API_URL=https://adrian-jackson--cranberry-inspector-cranberryinspector-predict.modal.run/
    depends_on:
      - backend
    restart: unless-stopped
